<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="cont-main">
        <div class="main-grid">
            <div class="grid-section" id="sidebar">
                <p class="sidebar-logo">The Watchers Council</p>
                <ul class="sidebar-links">
                    <a href="placeholder" class="page-link">
                        <img src="img/home_icon.svg" alt="home icon">
                        <h5>Dashboard</h5>
                    </a>
                    <a href="placeholder" class="page-link">
                        <img src="img/calendar_icon.svg" alt="calendar icon">
                        <h5>Calendar</h5>
                    </a>
                    <a href="placeholder" class="page-link">
                        <img src="img/bar_chart_icon.svg" alt="bar chart icon">
                        <h5>Stats</h5>
                    </a>
                    <a href="placeholder" class="page-link">
                        <img src="img/settings.svg" alt="settings icon">
                        <h5>Preferences</h5>
                    </a>
                </ul>
                <div class="user-info">
                    <img class="profile-picture" src="img/profile_picture.png" alt="Your profile picture">
                    <div class="profile-text-cont">
                        <h3>Buffy S.</h3>
                        <h6>Sunnydale, CA</h6>
                    </div>
                </div>
            </div>
            <div class="grid-section" id="header">
                <p class="header-welcome">Welcome back, <span>Buffy</span>!</p>
                <div class="header-button-cont">
                    <button class="header-button">
                        <img src="img/bell_icon.svg" alt="notification icon" class="header-icon">
                    </button>
                    <button class="header-button">
                        <img src="img/search_icon_white.svg" alt="search button icon" class="header-icon">
                    </button>
                    <button class="header-button">
                        <img src="img/speech_bubble_white.svg" alt="chat icon" class="header-icon">
                    </button>
                    <button class="header-button" id="new-project-button">
                        Start New Mission
                    </button>
                </div>
            </div>
            <div class="grid-section" id="stat-1"></div>
            <div class="grid-section" id="stat-2"></div>
            <div class="grid-section" id="stat-3"></div>
            <div class="grid-section" id="details"></div>
            <div class="grid-section" id="info"></div>
            <div class="grid-section" id="timeline"></div>
            <div class="grid-section" id="project"></div>
            <div class="grid-section" id="stat-4"></div>
        </div>
    </div>
</body>
</html>
