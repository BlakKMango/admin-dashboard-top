<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="cont-main">
        <div class="main-grid">
            <div class="grid-section" id="sidebar">
                <h1 class="sidebar-logo">Fakery</h1>
                <ul class="sidebar-links">
                    <a href="placeholder" class="page-link">
                        <img src="img/home_icon.svg" alt="home icon">
                        <h6>Dashboard</h6>
                    </a>
                    <a href="placeholder" class="page-link">
                        <img src="img/calendar_icon.svg" alt="calendar icon">
                        <h6>Calendar</h6>
                    </a>
                    <a href="placeholder" class="page-link">
                        <img src="img/bar_chart_icon.svg" alt="bar chart icon">
                        <h6>Stats</h6>
                    </a>
                    <a href="placeholder" class="page-link">
                        <img src="img/settings.svg" alt="settings icon">
                        <h6>Preferences</h6>
                    </a>
                </ul>
            </div>
            <div class="grid-section" id="header"></div>
            <div class="grid-section" id="stat-1"></div>
            <div class="grid-section" id="stat-2"></div>
            <div class="grid-section" id="stat-3"></div>
            <div class="grid-section" id="details"></div>
            <div class="grid-section" id="info"></div>
            <div class="grid-section" id="timeline"></div>
            <div class="grid-section" id="project"></div>
            <div class="grid-section" id="stat-4"></div>
        </div>
    </div>
</body>
</html>
